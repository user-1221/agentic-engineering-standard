<!DOCTYPE html>
<html lang="{{.Lang}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{index .T "err_title"}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=17">
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <a href="/" class="logo">AES</a>
                <span class="nav-version">v1.3</span>
            </div>
            <input type="checkbox" id="nav-toggle" class="nav-toggle-input" aria-hidden="true">
            <label for="nav-toggle" class="nav-toggle-label" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </label>
            <div class="nav-links">
                <a href="/how-it-works">{{index .T "nav_how"}}</a>
                <a href="/examples">{{index .T "nav_examples"}}</a>
                <a href="/registry">{{index .T "nav_registry"}}</a>
                <a href="/docs">{{index .T "nav_docs"}}</a>
                <a href="/">{{index .T "nav_home"}}</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="error-page">
            <h1>{{index .T "err_heading"}}</h1>
            <p class="error-message">{{.Error}}</p>
            <a href="/" class="btn">{{index .T "err_go_home"}}</a>
        </div>
    </main>

    <footer>
        <p>Apache 2.0 &middot; <a href="https://github.com/user-1221/agentic-engineering-standard">GitHub</a></p>
    </footer>
</body>
</html>
