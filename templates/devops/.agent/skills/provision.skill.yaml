aes_skill: "1.0"

id: "provision"
name: "Provision Infrastructure"
version: "1.0.0"
description: "Create or update cloud infrastructure via Terraform"

negative_triggers:
  - "Do NOT use for configuration management — use configure skill instead"
  - "Do NOT apply destructive changes without user confirmation"

allowed_tools:
  shell: true
  files:
    read: true
    write:
      - "terraform/**"
  network: true

stage: 1
phase: "infrastructure"

inputs:
  required:
    - name: "service"
      type: "string"
      description: "Service to provision"
  environment:
    - "AWS_PROFILE"

triggers:
  - type: "manual"
    command: "terraform plan && terraform apply"

error_handling:
  strategy: "fail-fast"

code:
  primary: "terraform/"

blocks: ["configure"]

tags: ["terraform", "infrastructure", "aws"]
