aes_skill: "1.0"

id: "publish"
name: "Publish Model"
version: "1.0.0"
description: "Upload model to HuggingFace and register with the prediction API"

negative_triggers:
  - "Do NOT use without HF_TOKEN configured"
  - "Do NOT use on unpackaged models"

allowed_tools:
  shell: true
  files:
    read: true
    write:
      - "pipeline/**"
  network: true

stage: 7
phase: "distribution"

inputs:
  required:
    - name: "db_connection"
      type: "sqlite3.Connection"
      description: "Active database connection"
    - name: "dataset_id"
      type: "int"
      description: "Dataset whose packaged model to publish"
  environment:
    - "HF_TOKEN"

outputs:
  - name: "published_urls"
    type: "list[str]"
    description: "URLs where the model is now available"

triggers:
  - type: "manual"
    command: "python scripts/run_pipeline.py --stage publish --dataset-id {ID}"

error_handling:
  strategy: "per-item-isolation"
  retries: 1

code:
  primary: "pipeline/publish.py"

depends_on:
  - "package"

tags: ["publishing", "huggingface", "api-registration"]
