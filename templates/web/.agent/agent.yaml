# Web Application — AES Template
aes: "1.1"

name: "web-app"
version: "1.0.0"
description: "Full-stack web application with auth, billing, and real-time updates"
domain: "web"

runtime:
  language: "typescript"
  version: "5.0"
  entry_point: "src/index.ts"

agent:
  instructions: "instructions.md"
  permissions: "permissions.yaml"
  orchestrator: "skills/ORCHESTRATOR.md"

skills:
  - id: "scaffold"
    manifest: "skills/scaffold.skill.yaml"
    runbook: "skills/scaffold.md"
  - id: "implement"
    manifest: "skills/implement.skill.yaml"
    runbook: "skills/implement.md"
  - id: "test"
    manifest: "skills/test.skill.yaml"
    runbook: "skills/test.md"
  - id: "review"
    manifest: "skills/review.skill.yaml"
    runbook: "skills/review.md"
  - id: "deploy"
    manifest: "skills/deploy.skill.yaml"
    runbook: "skills/deploy.md"

workflows:
  - id: "feature-lifecycle"
    path: "workflows/feature.yaml"

commands:
  - id: "memory"
    path: "commands/memory.md"
    trigger: "/memory"
    description: "Review conversation and save learnings to agent memory"

environment:
  required:
    - name: "DATABASE_URL"
      description: "PostgreSQL connection string"
    - name: "STRIPE_SECRET_KEY"
      description: "Stripe API key for billing"
  optional:
    - name: "NODE_ENV"
      default: "development"
      description: "Runtime environment"
