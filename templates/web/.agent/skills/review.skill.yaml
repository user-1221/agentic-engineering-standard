aes_skill: "1.0"

id: "review"
name: "Code Review"
version: "1.0.0"
description: "Run linting, type checking, bundle analysis, and security scan"

stage: 4
phase: "quality"

inputs:
  required:
    - name: "feature_name"
      type: "string"
      description: "Name of the feature under review"

outputs:
  - name: "review_passed"
    type: "bool"
    description: "Whether all review checks passed"
  - name: "issues"
    type: "list[str]"
    description: "List of issues found during review"

triggers:
  - type: "manual"
    command: "npm run lint && npm run typecheck"

error_handling:
  strategy: "fail-fast"

code:
  primary: "eslint.config.js"

depends_on:
  - "test"
blocks: ["deploy"]

tags: ["review", "linting", "security"]
