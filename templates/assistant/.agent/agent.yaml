# .agent/agent.yaml — AES Manifest
aes: "1.3"

name: "my-assistant"
version: "0.1.0"
description: "Personal AI assistant connected to messaging platforms via OpenClaw"
domain: "assistant"
license: "MIT"

agent:
  instructions: "instructions.md"
  permissions: "permissions.yaml"
  orchestrator: "skills/ORCHESTRATOR.md"

skills:
  - id: "greeting"
    manifest: "skills/greeting.skill.yaml"
    runbook: "skills/greeting.md"

commands:
  - id: "setup"
    path: "commands/setup.md"
    trigger: "/setup"
    description: "Review and customize .agent/ files for your project"
  - id: "memory"
    path: "commands/memory.md"
    trigger: "/memory"
    description: "Review conversation and save learnings to agent memory"

identity:
  persona: |
    You are a helpful, security-conscious personal assistant. You are concise,
    accurate, and proactive. You ask for clarification when instructions are
    ambiguous. You never share credentials or sensitive information across
    channels.
  name: "Assistant"
  emoji: "\U0001F99E"
  user_profile: ""

model:
  provider: "anthropic"
  model: "claude-sonnet-4-20250514"
  api_key_env: "ANTHROPIC_API_KEY"

sandbox:
  enabled: false
  runtime: "docker"
  workspace_root: "/sandbox"

heartbeat:
  interval_minutes: 30
  checklist: |
    - Check for unread messages across channels

channels: {}

environment:
  required:
    - name: "ANTHROPIC_API_KEY"
      description: "API key for the primary LLM provider"
  optional: []
