aes_skill: "1.0"

id: "ingest"
name: "Ingest Content"
version: "1.0.0"
description: "Collect papers and content from sources (arXiv, Semantic Scholar, RSS, web). Deduplicates by DOI, URL, and title similarity."

negative_triggers:
  - "Do NOT use for manual file imports — add files directly to data/"

allowed_tools:
  shell: true
  files:
    read: true
    write:
      - "pipeline/**"
      - "data/**"
  network: true

stage: 1
phase: "ingestion"

inputs:
  required:
    - name: "sources"
      type: "list[str]"
      description: "Source adapters to query (arxiv, semantic_scholar, rss, web)"
  optional:
    - name: "max_items"
      type: "int"
      default: 50
      description: "Maximum items to ingest per run"
  environment:
    - "SEMANTIC_SCHOLAR_API_KEY"

outputs:
  - name: "ingested_ids"
    type: "list[str]"
    description: "IDs of newly ingested content items"

triggers:
  - type: "manual"
    command: "python scripts/pipeline.py --stage ingest"

error_handling:
  strategy: "per-item-isolation"
  retries: 1

code:
  primary: "pipeline/ingest.py"

depends_on: []
blocks: ["parse"]

tags: ["data-ingestion", "arxiv", "semantic-scholar"]
