aes_skill: "1.0"

id: "organize"
name: "Organize Content"
version: "1.0.0"
description: "Categorize by topic and relevance, build taxonomy, cross-reference related items. Updates knowledge graph."

negative_triggers:
  - "Do NOT use for unanalyzed content — run analyze first"

allowed_tools:
  shell: true
  files:
    read: true
    write:
      - "pipeline/**"
      - "data/**"

stage: 4
phase: "taxonomy"

inputs:
  required:
    - name: "item_id"
      type: "str"
      description: "ID of the content item to organize"

outputs:
  - name: "categories"
    type: "list[str]"
    description: "Assigned taxonomy categories"
  - name: "cross_refs"
    type: "list[str]"
    description: "IDs of related content items"

triggers:
  - type: "manual"
    command: "python scripts/pipeline.py --stage organize --item-id {ID}"

error_handling:
  strategy: "per-item-isolation"
  retries: 1

code:
  primary: "pipeline/organize.py"

depends_on: ["analyze"]
blocks: ["display"]

tags: ["taxonomy", "organization", "knowledge-graph"]
