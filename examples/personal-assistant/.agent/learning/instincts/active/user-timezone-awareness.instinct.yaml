# .agent/learning/instincts/active/user-timezone-awareness.instinct.yaml
apiVersion: aes/v1
kind: Instinct

metadata:
  id: user-timezone-awareness
  created_at: "2026-03-10T09:00:00Z"
  last_validated: "2026-03-18T15:30:00Z"
  source_session: session-2026-03-10-morning
  tags: [communication, timezone, scheduling]

pattern:
  description: >
    When mentioning times in messages, always convert to
    the user's local timezone and include the timezone
    abbreviation. The user is in JST (UTC+9).

  trigger: >
    Agent is composing a message that includes a time
    reference (meeting times, deadlines, events).

  action: |
    1. Convert any UTC/remote times to JST
    2. Format as "HH:MM JST" (24-hour)
    3. If referencing a time in another timezone, show both

  evidence:
    - session: session-2026-03-10-morning
      outcome: "User corrected an unlocalized UTC time"
    - session: session-2026-03-15-calendar
      outcome: "User confirmed JST times were helpful"
    - session: session-2026-03-18-scheduling
      outcome: "Correctly showed JST + PST for cross-timezone meeting"

  examples:
    - context: Calendar reminder for a meeting at 14:00 UTC
      application: >
        Displayed as "23:00 JST (14:00 UTC)" in the message

confidence:
  score: 0.82
  validations: 5
  contradictions: 0
  decay_rate: 0.01
  min_score: 0.3
  status: active
