aes_permissions: "1.0"

allow:
  shell:
    read:
      - "git status"
      - "git log *"
      - "git diff *"
      - "scripts/job.sh status *"
      - "scripts/job.sh logs *"
      - "scripts/job.sh list"
      - "scripts/job.sh results *"
    execute:
      - "python scripts/run_pipeline.py *"
      - "python -m pytest *"
      - "scripts/job.sh start *"
    remote:
      - "ssh -i ~/.ssh/deploy_key -p 22 user@your-server.example.com *"

  files:
    read: "**/*"
    write:
      - "config/model_registry.py"
      - "config/settings.py"
      - "pipeline/**/*.py"
      - "trainers/**/*.py"
      - ".agent/memory/**"

deny:
  shell:
    - "rm -rf *"
    - "docker rm *"
    - "systemctl *"
    - "kill *crypto*"
  files:
    write:
      - ".env"
      - "*.sqlite3"
      - ".git/**"

confirm:
  shell:
    - "scripts/job.sh stop *"
    - "docker compose down *"
    - "scp *"
    - "git push *"
  files:
    delete: "**/*"
  actions:
    - "publish_model"
    - "create_api_key"
    - "lower_quality_gates"

resource_limits:
  max_cpu_percent: 70
  max_memory_percent: 75
  check_before:
    - "train"
    - "evaluate"
  on_exceeded: "warn_and_skip"

network:
  allow:
    - "https://api.anthropic.com/*"
    - "https://www.openml.org/*"
    - "https://huggingface.co/*"
  deny:
    - "*.internal.corp/*"

process:
  allow: ["python", "git", "pip"]
  deny: ["curl", "wget"]

data:
  classification: "internal"
  retention_days: 90
  pii_handling: "prohibit"
