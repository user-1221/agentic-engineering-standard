aes_skill: "1.0"

id: "train"
name: "Train Models"
version: "1.0.0"
description: "Run Optuna HPO and train all candidate models for a dataset"

negative_triggers:
  - "Do NOT use when CPU > 70% or memory > 75%"
  - "Do NOT use on unclassified datasets"

allowed_tools:
  shell: true
  files:
    read: true
    write:
      - "pipeline/**"
      - "models/**"
      - "data/**"
  network: false

stage: 4
phase: "training"

inputs:
  required:
    - name: "db_connection"
      type: "sqlite3.Connection"
      description: "Active database connection"
    - name: "dataset_id"
      type: "int"
      description: "Dataset to train"
  optional:
    - name: "model_keys"
      type: "list[str]"
      description: "Specific models to train (default: all selected)"
  environment:
    - "OPTUNA_TIMEOUT"
    - "OPTUNA_N_TRIALS"

outputs:
  - name: "experiment_ids"
    type: "list[int]"
    description: "IDs of completed experiments"
    state_change:
      entity: "dataset"
      from_status: "classified"
      to_status: "trained"

triggers:
  - type: "manual"
    command: "python scripts/run_pipeline.py --stage train --dataset-id {ID}"

error_handling:
  strategy: "per-item-isolation"
  retries: 0
  on_invalid_data: "skip_with_log"

code:
  primary: "pipeline/train.py"
  functions:
    - "train_all_models(conn, dataset_id, model_keys) -> list[int]"

depends_on:
  - "examine"
blocks: ["evaluate"]

tags: ["training", "optuna", "hpo"]
