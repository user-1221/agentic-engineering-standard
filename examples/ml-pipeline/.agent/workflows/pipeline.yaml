aes_workflow: "1.0"

id: "dataset-pipeline"
entity: "dataset"
description: "Dataset lifecycle from discovery through publication"

states:
  discovered:
    description: "Found and registered in database"
    initial: true
  examined:
    description: "Downloaded, profiled, quality-scored"
  classified:
    description: "Problem type detected, models selected"
  training:
    description: "Models being trained"
    active: true
  trained:
    description: "All models trained, awaiting evaluation"
  packaged:
    description: "Best model packaged as zip"
  published:
    description: "Live on API and HuggingFace"
    terminal: true
  rejected:
    description: "Failed quality criteria"
    terminal: true

transitions:
  - from: "discovered"
    to: "examined"
    skill: "examine"
    conditions:
      - "Data file downloadable"
    on_failure: "rejected"

  - from: "examined"
    to: "classified"
    skill: "classify"
    conditions:
      - "quality_score >= 0.30"
    on_failure: "rejected"

  - from: "classified"
    to: "training"
    skill: "train"
    conditions:
      - "At least one model selected"
      - "Resource limits met"

  - from: "training"
    to: "trained"
    skill: "train"
    conditions:
      - "At least one experiment completed"
    on_failure: "rejected"

  - from: "trained"
    to: "packaged"
    skill: "package"
    conditions:
      - "Best experiment passes quality gates"
      - "Best experiment beats baseline"
    on_failure: "rejected"

  - from: "packaged"
    to: "published"
    skill: "publish"
    conditions:
      - "At least one platform succeeds"

  - from: "trained"
    to: "classified"
    skill: "reclassify"
    conditions:
      - "All models below quality gates"
      - "Target is ordinal integer"
    description: "Reframe problem type when all models fail"

rejection:
  any_state_can_reject: true
  requires_reason: true
  column: "rejection_reason"

idempotency:
  pattern: "status-gated"
  description: "Each skill reads entities at expected status. Re-running is safe."

persistence:
  backend: "sqlite"
  table: "datasets"
  status_column: "status"
  updated_at: "updated_at"
