# AES Registry — nginx Reverse Proxy Configuration
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/aes-registry
#   2. Replace "registry.yourdomain.com" with your actual domain
#   3. Enable: ln -s /etc/nginx/sites-available/aes-registry /etc/nginx/sites-enabled/
#   4. Get TLS cert: certbot --nginx -d registry.yourdomain.com
#   5. Reload: nginx -t && systemctl reload nginx

# Global rate limit zone: 20 req/s per IP, 10MB state
limit_req_zone $binary_remote_addr zone=aes_global:10m rate=20r/s;

server {
    listen 80;
    server_name registry.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name registry.yourdomain.com;

    # TLS (certbot will update these paths)
    ssl_certificate /etc/letsencrypt/live/registry.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/registry.yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Max upload size (matches Go server limit)
    client_max_body_size 50m;

    # Global rate limit (burst allows short spikes)
    limit_req zone=aes_global burst=50 nodelay;
    limit_req_status 429;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 5s;
    }
}
